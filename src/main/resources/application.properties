spring.application.name=Tahadaw

# Load local overrides (password, API keys). File is gitignored — copy from application-local.properties.example
spring.config.import=optional:classpath:application-local.properties

spring.datasource.url=jdbc:mysql://localhost:3306/tahadaw
spring.datasource.username=root

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create-drop

spring.web.error.include-message=always
spring.web.error.include-stacktrace=always

# Omit null fields from all JSON responses
spring.jackson.default-property-inclusion=non_null

# --- AI (non-secret defaults; key goes in application-local.properties) ---
ai.model=gpt-5.5
ai.base-url=https://api.openai.com/v1
ai.max-tokens=4000
ai.reasoning-effort=low

# --- Twilio WhatsApp (secrets in application-local.properties) ---
twilio.api-url=https://api.twilio.com/2010-04-01

# --- SearchAPI.io (key in application-local.properties) ---
searchapi.base-url=https://www.searchapi.io/api/v1
searchapi.gl=sa
searchapi.hl=en

# --- Moyasar test mode (mock payments via Moyasar sandbox; key in application-local.properties) ---
moyasar.api-url=https://api.moyasar.com/v1/payments
# Browser redirect target after 3-D Secure (standalone page on GitHub Pages). Moyasar appends ?id=&status=.
# This is a static page independent of where the backend runs, so it works the same on local and AWS.
moyasar.callback-url=https://saudshafie.github.io/Tahadawpayment/
premium.amount-minor=9900
premium.currency=SAR
